name: CI

on:
  push:
    branches: [main, 'feat/**', 'feature/**', 'bugfix/**', 'hotfix/**']
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'next.config.ts'
      - 'middleware.ts'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  build:
    uses: tesserix/tesserix-infra/.github/workflows/_build-nextjs.yml@main
    with:
      service_name: tesserix-home
    secrets:
      PKG_READ_TOKEN: ${{ secrets.PKG_READ_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

  deploy:
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: tesserix/tesserix-infra/.github/workflows/_deploy-cloudrun.yml@main
    with:
      service_name: tesserix-home
      image: ${{ needs.build.outputs.image }}
      health_path: /api/health
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}

  cleanup:
    needs: [deploy]
    if: always() && needs.deploy.result == 'success'
    uses: tesserix/tesserix-infra/.github/workflows/_cleanup-gar.yml@main
    with:
      service_name: tesserix-home
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

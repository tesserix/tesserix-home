name: CI

on:
  push:
    branches: [main, 'feat/**', 'feature/**', 'bugfix/**', 'hotfix/**']
    paths:
      - 'src/**'
      - 'app/**'
      - 'pages/**'
      - 'components/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tesserix-home
  GCP_PROJECT_ID: tesseracthub-480811
  GKE_CLUSTER: tesseract-prod-in-gke
  GKE_REGION: asia-south1

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Authenticate to GCP (GKE deploy)
        id: auth_gcp
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/849928263410/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@tesseracthub-480811.iam.gserviceaccount.com
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push --all-tags ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}

      # --- Deploy to GKE (Knative) ---
      - name: Get GKE credentials
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.auth_gcp.outcome == 'success'
        continue-on-error: true
        id: gke_creds
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy (set image to SHA tag)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.gke_creds.outcome == 'success'
        continue-on-error: true
        run: |
          # The Deployment is created by the `company` Helm chart in
          # tesserix-k8s (KEDA-scaled, replaces the old Knative setup).
          #
          # We pin to the just-built SHA tag (rather than rollout-restart
          # against :latest) because the GAR remote-repository mirror
          # caches :latest's digest and revalidates only on cache-miss.
          # Two consecutive CI runs against :latest would deploy the same
          # stale digest. The SHA tag is unique per build so the mirror
          # always pulls fresh from upstream ghcr.io.
          #
          # ArgoCD's company app excludes the image field via
          # spec.ignoreDifferences (see argocd/prod/apps/global/company.yaml
          # in tesserix-k8s) so reconciliation does not revert this pin.
          kubectl -n tesserix set image deployment/company \
            company=asia-south1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/ghcr-remote/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          kubectl rollout status deployment/company -n tesserix --timeout=5m

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

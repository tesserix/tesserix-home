name: CI

on:
  push:
    branches: [main, 'feat/**', 'feature/**', 'bugfix/**', 'hotfix/**']
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'turbo.json'
      - '.npmrc'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  IMAGE_NAME: tesserix-home

permissions:
  contents: read
  packages: write
  security-events: write
  actions: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read # upload-sarif@v3 reads the run's metadata (else it 403s on push)
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Unit tests
        run: pnpm --filter web test:unit

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=main-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      # Image build/push (and the scan steps below) run ONLY on pushes to main.
      # A push to any other branch (feat/**, etc.) would otherwise publish a
      # main-<sha> image that Kargo auto-promotes straight to prod — an
      # unintended deploy. PRs validate lint/test without building an image.
      - name: Build and push
        if: github.ref == 'refs/heads/main'
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push --all-tags ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}

      # No GKE deploy step here. Cluster rollout is owned by Kargo:
      # the kargo-tesserix-home Project's prod Stage discovers the new
      # main-<sha> image (via the GAR ghcr-remote mirror), auto-promotes
      # it, and rewrites the `company` Argo CD Application's `image.tag`
      # Helm parameter — Argo CD then syncs the Deployment. See
      # tesserix-k8s: kargo-manifests/projects/tesserix-home and
      # argocd/prod/apps/global/company.yaml.

      - name: Security scan
        if: github.ref == 'refs/heads/main'
        # Pinned off @master — @master regressed (cache-path failure). v0.36.0
        # pins setup-trivy/actions-cache to known-good versions.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload scan results
        if: github.ref == 'refs/heads/main'
        # Code scanning needs GitHub Advanced Security, which is off while this repo is
        # private; keep the SARIF upload best-effort so it succeeds when public/GHAS and
        # never fails CI when it can't upload. The Trivy scan itself still runs above.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

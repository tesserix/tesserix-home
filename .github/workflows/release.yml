name: Tesserix Home - Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  security-events: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GCP_PROJECT_ID: tesseracthub-480811
  GAR_REGISTRY: asia-south1-docker.pkg.dev
  GAR_REPOSITORY: cloud-run-source-deploy
  CLOUD_RUN_SERVICE: marketplace-tesserix-home

jobs:
  # =============================================================================
  # Quality Checks - Linting (runs first)
  # =============================================================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PKG_READ_TOKEN }}

      - name: Run ESLint
        id: lint
        run: |
          npm run lint 2>&1 | tee lint-output.txt
          LINT_EXIT=${PIPESTATUS[0]}
          WARNINGS=$(grep -c "warning" lint-output.txt || echo "0")
          ERRORS=$(grep -c "error" lint-output.txt || echo "0")
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          exit 0  # Don't fail the job for warnings
        continue-on-error: true

      - name: Quality Summary
        if: always()
        run: |
          echo "## Quality Check Summary - Tesserix Home" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ steps.lint.outcome == 'success' && '✅ Passed' || '⚠️ Warnings' }} |" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Release Build (runs after quality checks)
  # =============================================================================
  release:
    name: Release Tesserix Home
    runs-on: ubuntu-latest
    needs: [quality]
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          # Remove 'v' prefix if present
          VERSION="${TAG#v}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          token_format: access_token

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Compute GAR image tag
        id: gar-tag
        run: |
          GAR_IMAGE="${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}"
          echo "gar_image=$GAR_IMAGE" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=Tesserix Home
            org.opencontainers.image.description=Tesserix Homepage & Admin Portal
            org.opencontainers.image.vendor=Tesserix
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_ENV=production
          secrets: |
            NODE_AUTH_TOKEN=${{ secrets.PKG_READ_TOKEN }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: spdx-json
          output-file: sbom-tesserix-home-${{ steps.version.outputs.version }}.spdx.json
        continue-on-error: true

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-tesserix-home-${{ steps.version.outputs.version }}
          path: sbom-tesserix-home-${{ steps.version.outputs.version }}.spdx.json
          retention-days: 90
        continue-on-error: true

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = '${{ steps.version.outputs.tag }}';

            const releaseNotes = `## Tesserix Home - Release v${version}

            ### Docker Images

            The following Docker images have been published to GitHub Container Registry:

            \`\`\`
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            \`\`\`

            ### Image Details

            - **Registry:** \`${{ env.REGISTRY }}\`
            - **Image:** \`${{ env.IMAGE_NAME }}\`
            - **Version:** \`${version}\`
            - **Platforms:** linux/amd64, linux/arm64
            - **Digest:** \`${{ steps.build.outputs.digest }}\`

            ### Tags

            ${{ steps.meta.outputs.tags }}

            ### Build Information

            - **Commit SHA:** ${{ github.sha }}
            - **Build Date:** ${new Date().toISOString()}

            ### Security

            - ✅ Vulnerability scanning completed with Trivy
            - ✅ SBOM generated and attached
            - ✅ Build provenance attestation created
            - ✅ Quality checks (lint) passed

            ### Deployment

            To deploy this version:

            \`\`\`bash
            docker run -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}
            \`\`\`

            Or update your Kubernetes manifests to use the new image tag.
            `;

            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Tesserix Home v${version}`,
                body: releaseNotes,
                draft: false,
                prerelease: version.includes('-'),
                generate_release_notes: false
              });
              console.log(`Created release for ${tag}`);
            } catch (error) {
              if (error.status === 422) {
                console.log('Release already exists, skipping creation');
              } else {
                throw error;
              }
            }

      - name: Release Summary
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** Tesserix Home" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release completed successfully!" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Production Approval Gate (self-approval blocked)
  # =============================================================================
  approve-prod:
    name: Approve Production Deploy
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      approved_by: ${{ steps.wait.outputs.approved_by }}

    steps:
      - name: Request approval via issue
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.release.outputs.version }}';
            const actor = '${{ github.actor }}';
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Approve prod deploy: tesserix-home v${version}`,
              body: [
                `## Production Deployment Approval`,
                ``,
                `**Service:** tesserix-home`,
                `**Version:** ${version}`,
                `**Triggered by:** @${actor}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                ``,
                `### To approve`,
                `Comment \`/approve\` on this issue.`,
                ``,
                `> ⚠️ **Self-approval is blocked.** @${actor} cannot approve this deployment.`,
                ``,
                `### To reject`,
                `Comment \`/reject\` or close this issue.`,
              ].join('\n'),
              labels: ['deploy-approval'],
            });
            core.setOutput('issue_number', issue.number);
            console.log(`Created approval issue #${issue.number}`);

      - name: Wait for approval
        id: wait
        uses: actions/github-script@v7
        timeout-minutes: 60
        with:
          script: |
            const issueNumber = ${{ steps.issue.outputs.issue_number }};
            const actor = '${{ github.actor }}'.toLowerCase();
            const pollInterval = 15000;

            while (true) {
              await new Promise(r => setTimeout(r, pollInterval));

              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              if (issue.data.state === 'closed') {
                core.setFailed('Deployment rejected — issue was closed.');
                return;
              }

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              for (const comment of comments) {
                const body = comment.body.trim().toLowerCase();
                const commenter = comment.user.login.toLowerCase();

                if (body === '/reject') {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'not_planned',
                  });
                  core.setFailed(`Deployment rejected by @${comment.user.login}`);
                  return;
                }

                if (body === '/approve') {
                  if (commenter === actor) {
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issueNumber,
                      body: `❌ @${comment.user.login} — self-approval is not allowed. A different team member must approve.`,
                    });
                    continue;
                  }

                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    state: 'closed',
                    state_reason: 'completed',
                  });
                  core.setOutput('approved_by', comment.user.login);
                  console.log(`Approved by @${comment.user.login}`);
                  return;
                }
              }
            }

  # =============================================================================
  # Deploy to Cloud Run (production)
  # =============================================================================
  deploy-cloudrun:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [release, approve-prod]

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}:${{ needs.release.outputs.version }}" \
            --region asia-south1 \
            --project ${{ env.GCP_PROJECT_ID }} \
            --quiet

      - name: Deploy Summary
        run: |
          echo "## Cloud Run Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ env.CLOUD_RUN_SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** asia-south1" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Approved by:** ${{ needs.approve-prod.outputs.approved_by }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}:${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to Cloud Run!" >> $GITHUB_STEP_SUMMARY
